project: GrowthCurve Time Encoding Benchmark
entity: ethan_personal


command:
  - accelerate
  - launch
  - --num_processes=3
  - /home/ethan2/GrowthNet/time_encoding_sweep.py
  - ${args}                # W&B will expand flags here

method: bayes
metric:
  name: Pearson_val - MAE_val
  goal: maximize

parameters:

  phases:
    values: [4]
  epochs:
    value: 30

  weight_decay:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 1.0e-1

  dropout:
    distribution: uniform
    min: 0.
    max: 0.3

  encoding:
    values: ["fourier"]

  min_lr:
    distribution: log_uniform_values
    min: 1.0e-9
    max: 1.0e-6

  hidden_dim:
    value: 32

  hidden_layers:
    value: 3   # use 'values: [2,3,4]' etc. if you want to sweep

  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 1.0e-2

  batch_size:
    values: [256, 512]

