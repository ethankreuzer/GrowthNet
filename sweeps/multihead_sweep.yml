project: GrowthCurve MultiHead model
entity: ethan_personal

command:
  - python
  - /home/ethan2/GrowthCurve/sweeps/sweep_multihead_lightning.py
  - ${args}                # W&B will expand flags here

method: bayes
metric:
  name: val_main/AP+AUC-MAE+Pearson
  goal: maximize

parameters:

  samples:
    distribution: int_uniform
    min: 3
    max: 15

  weight_decay:
    distribution: log_uniform_values
    min: 0.00000001
    max: 0.001

  seed:
    values: [42]

  loss_lambda:
    distribution: log_uniform_values
    min: 0.1
    max: 10

  max_learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01

  dropout_rate:
    distribution: uniform
    min: 0.0
    max: 0.6

  active_fraction:
    distribution: uniform
    min: 0.25
    max: 0.9

  batch_size:
    distribution: q_log_uniform_values
    min: 10
    max: 200

  epochs:
    distribution: int_uniform
    min: 1
    max: 3

  trunk_layers:
    distribution: int_uniform
    min: 2
    max: 15

  trunk_dim:
    distribution: q_log_uniform_values
    min: 32
    max: 256

  trunk_final_layer_dim:
    distribution: q_log_uniform_values
    min: 4
    max: 256

  reg_layers:
    distribution: int_uniform
    min: 1
    max: 3

  reg_hidden:  
    distribution: q_log_uniform_values
    min: 4
    max: 64

  cls_layers: 
    distribution: int_uniform
    min: 1
    max: 3

  cls_hidden:
    distribution: q_log_uniform_values
    min: 4
    max: 64
    
