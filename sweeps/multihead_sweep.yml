project: Predictive model final sweep
entity: ethan_personal

command:
  - python
  - /home/ethan2/GrowthNet/sweeps/sweep_multihead_lightning.py
  - ${args}                # W&B will expand flags here

method: bayes
metric:
  name: val_main/best_agg_metric
  goal: maximize

parameters:

  samples:
    distribution: int_uniform
    min: 15
    max: 25

  weight_decay:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.001

  seed:
    values: [42]

  loss_lambda:
    distribution: log_uniform_values
    min: 5
    max: 15

  max_learning_rate:
    distribution: log_uniform_values
    min: 0.005
    max: 0.05

  dropout_rate:
    distribution: uniform
    min: 0.0
    max: 0.3

  active_fraction:
    distribution: uniform
    min: 0.3
    max: 0.5

  batch_size:
    distribution: q_log_uniform_values
    min: 5
    max: 25

  epochs:
    distribution: q_log_uniform_values
    min: 175
    max: 250

  trunk_layers:
    values: [1]

  trunk_dim:
    distribution: q_log_uniform_values
    min: 450
    max: 700

  reg_layers:
    values: [2,3,4,5]

  reg_hidden:  
    distribution: q_log_uniform_values
    min: 16
    max: 128

  cls_layers: 
    values: [0,1,2,3,4]

  cls_hidden:
    distribution: q_log_uniform_values
    min: 16
    max: 129

  regression_noise:
    values: [0.0, 0.00025, 0.0005, 0.001, 0.005]

  feature_set:
    values: ["minimol_classic"]