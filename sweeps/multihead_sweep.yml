project: Predictive model final sweep
entity: ethan_personal

command:
  - python
  - /home/ethan2/GrowthNet/sweeps/sweep_multihead_lightning.py
  - ${args}                # W&B will expand flags here

method: bayes
metric:
  name: val_main/best_agg_metric
  goal: maximize

parameters:

  samples:
    distribution: int_uniform
    min: 20
    max: 30

  weight_decay:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.001

  seed:
    values: [42]

  loss_lambda:
    distribution: log_uniform_values
    min: 5
    max: 10

  max_learning_rate:
    distribution: log_uniform_values
    min: 0.001
    max: 0.05

  pct_start:
    distribution: uniform
    min: 0.05
    max: 0.4

  initial_lr_ratio:
    distribution: uniform
    min: 0.02
    max: 0.1

  final_lr_ratio:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-3

  dropout_rate:
    distribution: uniform
    min: 0.10
    max: 0.25

  active_fraction:
    distribution: uniform
    min: 0.3
    max: 0.5

  batch_size:
    distribution: q_log_uniform_values
    min: 4
    max: 15

  epochs:
    distribution: q_log_uniform_values
    min: 150
    max: 215

  trunk_layers:
    values: [1]

  trunk_dim:
    distribution: q_log_uniform_values
    min: 450
    max: 600

  reg_layers:
    values: [2,3,4]

  reg_hidden:  
    distribution: q_log_uniform_values
    min: 16
    max: 75

  cls_layers: 
    values: [0]

  cls_hidden:
    values: [0]

  regression_noise:
    values: [0.0, 0.00025, 0.0005]

  feature_set:
    values: ["minimol_classic"]